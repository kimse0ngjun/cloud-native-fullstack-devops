<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>게시판 목록</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
	<h2>게시글 목록</h2>
	<table class="board_list">
		<colgroup>
			<col width="10%">
			<col width="*">
			<col width="15%">
			<col width="20%">
		</colgroup>
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>조회수</th>
				<th>작성일</th>
			</tr>
		</thead>
		<tbody>
			<tr th:if="${#lists.size(list) > 0}" th:each="list : ${list}">
				<td th:text="${list.boardId}"></td>
				<td>
					<a th:href="@{/board/{id}(id=${list.boardId})}" th:text="${list.title}"></a>
				</td>
				<td th:text="${list.hitCnt}"></td>
				<td th:text="${list.createdDatetime}"></td>
			</tr>
			<tr th:unless="${#lists.size(list) > 0}">
				<td colspan="4">조회된 결과가 없습니다.</td>
			</tr>
		</tbody>
	</table>
	<a th:href="@{/board/write}">글쓰기</a>
</div>
</body>
</html>
